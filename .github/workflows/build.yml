name: Build executables

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: SimpleImageCompare-windows
            artifact_path: dist/SimpleImageCompare.exe
            asset_glob: dist/SimpleImageCompare.exe
          - os: ubuntu-22.04
            artifact_name: SimpleImageCompare-linux
            artifact_path: dist/SimpleImageCompare
            asset_glob: dist/SimpleImageCompare
          - os: macos-latest
            artifact_name: SimpleImageCompare-macos
            artifact_path: dist/SimpleImageCompare-macos.zip
            asset_glob: dist/SimpleImageCompare-macos.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm SimpleImageCompare.spec

      - name: Zip macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r SimpleImageCompare-macos.zip SimpleImageCompare.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_glob }}
